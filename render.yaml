# Render Blueprint v1.1 - Fixed structure
databases:
  - name: crm-db
    plan: free
    databaseName: real_estate_crm
    user: crm_user

services:
  # Backend (Express)
  - type: web
    name: crm-api
    plan: free
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend (React + Vite)
  - type: static
    name: crm-frontend
    plan: free
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: crm-api
          property: url

